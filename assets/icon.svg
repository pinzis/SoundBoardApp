<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e2358"/>
      <stop offset="55%" stop-color="#1d1438"/>
      <stop offset="100%" stop-color="#130d22"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0.3" x2="1" y2="0.7">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="38%" stop-color="#ec4899"/>
      <stop offset="68%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="topglow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="behind" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <clipPath id="squircle">
      <rect x="48" y="48" width="928" height="928" rx="224"/>
    </clipPath>
  </defs>

  <!-- icon body -->
  <rect x="48" y="48" width="928" height="928" rx="224" fill="url(#bg)"/>

  <g clip-path="url(#squircle)">
    <!-- top sheen -->
    <rect x="48" y="48" width="928" height="928" fill="url(#topglow)"/>
    <!-- glow behind the waveform -->
    <circle cx="512" cy="540" r="300" fill="url(#behind)" filter="url(#blur)"/>
  </g>

  <!-- inner hairline -->
  <rect x="48" y="48" width="928" height="928" rx="224" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>

  <!-- waveform -->
  <g transform="translate(140,118) scale(31)" filter="url(#glow)">
    <path d="M3 12h2.2l2-7 3.4 16 3-12 1.8 6H21"
          fill="none" stroke="url(#wave)" stroke-width="1.35"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
