<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif">
  <defs>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="45%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="sound" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="55%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="blobV" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobM" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobC" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="360" rx="28" fill="#0a0813"/>
  <rect width="1200" height="360" rx="28" fill="#0d0a1a"/>

  <!-- aurora blobs -->
  <g filter="url(#soft)">
    <circle cx="200" cy="90"  r="170" fill="url(#blobV)"/>
    <circle cx="980" cy="300" r="190" fill="url(#blobM)"/>
    <circle cx="1080" cy="60" r="150" fill="url(#blobC)"/>
    <circle cx="560" cy="330" r="150" fill="url(#blobV)"/>
  </g>

  <!-- subtle border -->
  <rect x="1" y="1" width="1198" height="358" rx="27" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- logo mark -->
  <g transform="translate(96,150)">
    <rect x="-34" y="-34" width="68" height="68" rx="20" fill="#140f24" stroke="#ffffff" stroke-opacity="0.12"/>
    <g transform="scale(1.7) translate(-12,-12)" filter="url(#glow)">
      <path d="M3 12h2.2l2-7 3.4 16 3-12 1.8 6H21" fill="none" stroke="url(#aurora)" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- title -->
  <text x="172" y="158" font-size="74" font-weight="800" letter-spacing="-1">
    <tspan fill="url(#sound)">Sound</tspan><tspan fill="#f4f1fb">board</tspan>
  </text>

  <!-- tagline -->
  <text x="174" y="206" font-size="23" font-weight="500" fill="#b9b2d0" letter-spacing="0.2">
    Live soundboard · real-time mic FX · system-wide hotkeys
  </text>

  <!-- pills -->
  <g font-size="16" font-weight="600">
    <g transform="translate(174,242)">
      <rect width="170" height="38" rx="19" fill="#ffffff" fill-opacity="0.05" stroke="#a855f7" stroke-opacity="0.45"/>
      <text x="20" y="25" fill="#d6cdf0">🎚️ Audio routing</text>
    </g>
    <g transform="translate(358,242)">
      <rect width="150" height="38" rx="19" fill="#ffffff" fill-opacity="0.05" stroke="#ec4899" stroke-opacity="0.45"/>
      <text x="20" y="25" fill="#f3cfe4">🎤 Voice FX</text>
    </g>
    <g transform="translate(522,242)">
      <rect width="156" height="38" rx="19" fill="#ffffff" fill-opacity="0.05" stroke="#22d3ee" stroke-opacity="0.45"/>
      <text x="20" y="25" fill="#c7f1f8">🌐 IT · EN · ES</text>
    </g>
    <g transform="translate(692,242)">
      <rect width="178" height="38" rx="19" fill="#ffffff" fill-opacity="0.05" stroke="#34d399" stroke-opacity="0.45"/>
      <text x="20" y="25" fill="#c7f3df">⚡ Auto-updates</text>
    </g>
  </g>

  <!-- decorative equalizer bars -->
  <g transform="translate(980,150)" opacity="0.9">
    <rect x="0"   y="-20" width="10" height="40"  rx="5" fill="url(#aurora)" opacity="0.55"/>
    <rect x="20"  y="-44" width="10" height="88"  rx="5" fill="url(#aurora)" opacity="0.75"/>
    <rect x="40"  y="-64" width="10" height="128" rx="5" fill="url(#aurora)"/>
    <rect x="60"  y="-34" width="10" height="68"  rx="5" fill="url(#aurora)" opacity="0.7"/>
    <rect x="80"  y="-54" width="10" height="108" rx="5" fill="url(#aurora)" opacity="0.85"/>
    <rect x="100" y="-24" width="10" height="48"  rx="5" fill="url(#aurora)" opacity="0.6"/>
    <rect x="120" y="-44" width="10" height="88"  rx="5" fill="url(#aurora)" opacity="0.78"/>
    <rect x="140" y="-16" width="10" height="32"  rx="5" fill="url(#aurora)" opacity="0.5"/>
  </g>
</svg>
